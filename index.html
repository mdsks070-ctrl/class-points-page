  <script>
    // 기존 모듈형 API 이름을 compat SDK에 연결하는 어댑터 — 앱 코드는 수정 없이 그대로 동작
    window.firebaseModulesReady = new Promise(function (resolve, reject) {
      if (typeof firebase === 'undefined') {
        reject(new Error('Firebase 스크립트를 불러오지 못했습니다. 인터넷 연결을 확인해 주세요.'));
        return;
      }
      resolve({
        initializeApp: function (config) { return firebase.initializeApp(config); },
        getAuth: function () { return firebase.auth(); },
        signInAnonymously: function (auth) { return auth.signInAnonymously(); },
        onAuthStateChanged: function (auth, cb) { return auth.onAuthStateChanged(cb); },
        signInWithCustomToken: function (auth, token) { return auth.signInWithCustomToken(token); },
        getFirestore: function () { return firebase.firestore(); },
        collection: function (db) { return db.collection(Array.prototype.slice.call(arguments, 1).join('/')); },
        addDoc: function (colRef, data) { return colRef.add(data); },
        updateDoc: function (docRef, data) { return docRef.update(data); },
        doc: function (db) { return db.doc(Array.prototype.slice.call(arguments, 1).join('/')); },
        onSnapshot: function (refOrQuery, onNext, onError) { return refOrQuery.onSnapshot(onNext, onError); },
        deleteDoc: function (docRef) { return docRef.delete(); },
        getStorage: function () { return firebase.storage(); },
        ref: function (storage, path) { return storage.ref(path); },
        uploadBytesResumable: function (storageRef, file) { return storageRef.put(file); },
        getDownloadURL: function (storageRef) { return storageRef.getDownloadURL(); },
        deleteObject: function (storageRef) { return storageRef.delete(); }
      });
    });
  </script>

<body>
  <div id="root">

  <script type="text/babel">
    (async function bootstrapClassSite() {

        const firebaseModules = await Promise.race([
          window.firebaseModulesReady,

        const {

    // 아이콘 컴포넌트 (FontAwesome 맵핑)
    const Icon = ({ name, size = 24, className = "" }) => (
      <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: `${size}px` }}></i>

    // ===== Drive 사진 게시판 Apps Script 웹앱 연결 =====
    // Apps Script 배포 URL은 반드시 /exec 로 끝나는 주소를 넣으세요.

    const PHOTO_DRIVE_FOLDER_URL = 'https://drive.google.com/drive/folders/1CfGsDpBbQJwtaj8efzIHe9tUoQYLCeZ4?usp=sharing';
    const VIDEO_DRIVE_FOLDER_URL = 'https://drive.google.com/drive/folders/18_LGatb9cEBvBI2Hqzt7g30X55SgSHwS';
    const cleanPhotoBoardUrl = (PHOTO_BOARD_WEBAPP_URL || '').trim();
    const isPhotoBoardUrlReady = /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec(?:\?.*)?$/.test(cleanPhotoBoardUrl);
    const isPhotoBoardUrlDrive = /^https?:\/\/drive\.google\.com\//.test(cleanPhotoBoardUrl);
    const getPhotoAppUrl = (mode) => {
      if (!isPhotoBoardUrlReady) return cleanPhotoBoardUrl;
      const separator = cleanPhotoBoardUrl.includes('?') ? '&' : '?';
      return `${cleanPhotoBoardUrl}${separator}mode=${encodeURIComponent(mode)}`;
    };
    // App 바깥에 정의: 매초 리렌더링돼도 iframe이 다시 로드되지 않도록 컴포넌트 정체성을 고정
    const PhotoAppFrame = React.memo(function PhotoAppFrame({ mode, title, minHeight = '820px', tone = 'slate' }) {
      const directUrl = getPhotoAppUrl(mode);
      if (isPhotoBoardUrlReady) {
        return (
          <div className="bg-white border-2 border-slate-100 rounded-3xl overflow-hidden shadow-sm">
            <div className="flex items-center justify-between px-5 py-2.5 bg-slate-50/80 border-b border-slate-100">
              <span className="text-xs font-bold text-slate-400 truncate">{title}</span>
              <a href={directUrl} target="_blank" rel="noopener noreferrer" className="text-xs font-bold text-slate-400 hover:text-indigo-500 transition-colors shrink-0 ml-3" title="문제가 있을 때만 사용하세요">

            </div>
            <iframe
              src={directUrl}
              title={title}
              className="w-full border-0 bg-white"
              style={{ minHeight }}
              loading="eager"
              allow="camera; microphone; clipboard-read; clipboard-write; fullscreen"
              referrerPolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
        );
      }
      return (
        <div className="rounded-3xl p-6 leading-relaxed bg-amber-50 border border-amber-200 text-amber-900">
          <h3 className="font-black text-lg mb-2">
            <Icon name="triangle-exclamation" size={18} className="mr-2" />

          </h3>
          <p className="text-sm mb-3">
            배포한 Apps Script 웹앱 주소를 이 HTML 코드 상단의 <strong>PHOTO_BOARD_WEBAPP_URL</strong> 값에 넣어주세요. 주소는 <strong>/exec</strong>로 끝나는 배포 URL이어야 합니다.
          </p>

            const PHOTO_BOARD_WEBAPP_URL = 'https://script.google.com/macros/s/배포ID/exec';
          </div>
        </div>
      );
    });
    // 선생님 Firebase 프로젝트 설정 적용
    const isCanvasEnvironment = typeof __firebase_config !== 'undefined';
    const firebaseConfig = isCanvasEnvironment ? JSON.parse(__firebase_config) : {
      apiKey: "AIzaSyDrZ5KDbkfR3hDj9U0lI2VHhgzNXNE_1cU",
      authDomain: "school-debate-1.firebaseapp.com",
      projectId: "school-debate-1",
      storageBucket: "school-debate-1.firebasestorage.app",
      messagingSenderId: "711490484046",
      appId: "1:711490484046:web:1fa6e1400c1451d776101f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'school-debate-1';
    // 명렬표
    const classRoster = [
      { name: '고우민', gender: '남' }, { name: '권다윤', gender: '여' }, { name: '김도진', gender: '남' },

      { name: '박성훈', gender: '남' }, { name: '박주희', gender: '여' }, { name: '성아림', gender: '여' },
      { name: '양선우', gender: '남' }, { name: '염성빈', gender: '남' }, { name: '오하린', gender: '여' },
      { name: '유주원', gender: '남' }, { name: '이가은', gender: '여' }, { name: '이승재', gender: '남' },
      { name: '이은', gender: '여' }, { name: '이현성', gender: '남' }, { name: '정하윤', gender: '여' },
      { name: '최수호', gender: '남' }, { name: '최준혁', gender: '남' }, { name: '최지안', gender: '여' },
      { name: '황아영', gender: '여' }, { name: '황재준', gender: '남' }, { name: '박라희', gender: '여' }

      { name: '선곡권 3곡', cost: 400, limit: '' },
      { name: '포인트 선물권', cost: 400, limit: '' },
      { name: '옆 자리 선택', cost: 400, limit: '' },
      { name: '당첨', cost: 400, limit: '' },
      { name: '쉬는시간 2분', cost: 400, limit: '' }

    // 화면에 별도 항목으로 보여줄 현재 월의 1인 1역 재투표 고유 키
    const getCurrentOneRoleVoteMeta = () => {
      const now = new Date();
      const parts = new Intl.DateTimeFormat('ko-KR', {
        timeZone: 'Asia/Seoul', year: 'numeric', month: 'numeric'
      }).formatToParts(now);
      const year = Number(parts.find(part => part.type === 'year')?.value || now.getFullYear());
      const monthNumber = Number(parts.find(part => part.type === 'month')?.value || (now.getMonth() + 1));
      const month = String(monthNumber).padStart(2, '0');
      return {
        monthKey: `${year}-${month}`,
        voteId: `${year}-${month}-one-role-revote`,
        title: `${year}년 ${monthNumber}월 1인 1역 재투표`
      };
    };
    function App() {
      // ===== 공통 및 인증 상태 =====
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('points');
      // 한번 연 iframe 탭은 유지(keep-alive): 탭 전환 시 다시 로딩하지 않도록
      const [visitedTabs, setVisitedTabs] = useState({});
      useEffect(() => {
        setVisitedTabs(prev => prev[activeTab] ? prev : { ...prev, [activeTab]: true });

      const [isProcessing, setIsProcessing] = useState(false);

      const [teacherError, setTeacherError] = useState('');
      // ===== 설문조사 관련 상태 =====
      const [surveys, setSurveys] = useState([]);
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [formData, setFormData] = useState({ name: '', nominee: '', reason: '' });
      const [surveyErrorMsg, setSurveyErrorMsg] = useState('');
      const oneRoleVoteMeta = getCurrentOneRoleVoteMeta();
      // ===== 추가 설문 게시판 관련 상태 =====

      const [surveyResponses, setSurveyResponses] = useState([]);
      const [surveyCreateOpen, setSurveyCreateOpen] = useState(false);
      const [surveyFeedbackMsg, setSurveyFeedbackMsg] = useState('');
      const [newSurveyForm, setNewSurveyForm] = useState({ title: '', description: '', question: '', isSecret: false });
      const [surveyAnswerForms, setSurveyAnswerForms] = useState({});
      // ===== 양자 대결 월드컵 설문 관련 상태 =====
      const [worldcupPolls, setWorldcupPolls] = useState([]);
      const [worldcupResponses, setWorldcupResponses] = useState([]);
      const [worldcupLiveVotes, setWorldcupLiveVotes] = useState([]);
      const [worldcupCreateOpen, setWorldcupCreateOpen] = useState(false);
      const [newWorldcupForm, setNewWorldcupForm] = useState({
        title: '간단 이상형 월드컵',

      const [worldcupAnswerForms, setWorldcupAnswerForms] = useState({});

      const [worldcupTick, setWorldcupTick] = useState(Date.now());
      const worldcupAutoRevealRef = useRef({});
      // ===== 짝사진 희망 조사 관련 상태 =====
      const [pairPhotoRequests, setPairPhotoRequests] = useState([]);
      const [pairPhotoForm, setPairPhotoForm] = useState({ name: '', partners: [], memo: '' });
      const [pairPhotoSubmitted, setPairPhotoSubmitted] = useState(false);
      const [pairPhotoFeedbackMsg, setPairPhotoFeedbackMsg] = useState('');
      const [pairPhotoExportMsg, setPairPhotoExportMsg] = useState('');
      // ===== 포인트 뱅크 관련 상태 =====
      const [students, setStudents] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [sortBy, setSortBy] = useState('name');
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [pointModalTab, setPointModalTab] = useState('history');
      const [amount, setAmount] = useState('');
      const [desc, setDesc] = useState('');
      const [rewardForm, setRewardForm] = useState({ name: '', cost: '400', recipientId: 'self', limit: '', memo: '' });

      // ===== 일괄 포인트 지급 관련 상태 =====
      const [bulkOpen, setBulkOpen] = useState(false);
      const [bulkAmount, setBulkAmount] = useState('');
      const [bulkDesc, setBulkDesc] = useState('');
      const [bulkNames, setBulkNames] = useState('');
      const [bulkFeedbackMsg, setBulkFeedbackMsg] = useState(''); // 상태 메시지용
      // ===== 링크 모음 관련 상태 =====
      const [links, setLinks] = useState([]);
      const [linkTitle, setLinkTitle] = useState('');
      const [linkUrl, setLinkUrl] = useState('');
      // ===== 영상 갤러리 관련 상태 =====
      const [videos, setVideos] = useState([]);
      const [videoTitle, setVideoTitle] = useState('');
      const [uploadType, setUploadType] = useState('file');
      const [videoFile, setVideoFile] = useState(null);
      const [videoLink, setVideoLink] = useState('');
      const [uploadProgress, setUploadProgress] = useState(0);
      const fileInputRef = useRef(null);
      // 학생 영상 제출은 기존 Google Apps Script/Drive 화면을 iframe으로 불러옵니다.
      // ===== Firebase 초기화 및 리스너 =====
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (isCanvasEnvironment && typeof __initial_auth_token !== 'undefined') {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.log("Firebase 익명 로그인 미설정 우회 접속:", err);
            setUser({ uid: 'anonymous-google-sites-user' });
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => { if (u) setUser(u); });
        return () => unsubscribe();
      }, []);
      useEffect(() => {
        if (!user || !db) return;

        const surveyPath = isCanvasEnvironment ? collection(db, 'artifacts', appId, 'public', 'data', 'surveys') : collection(db, 'surveys');
        const surveyBoardsPath = isCanvasEnvironment ? collection(db, 'artifacts', appId, 'public', 'data', 'surveyBoards') : collection(db, 'surveyBoards');
        const surveyResponsesPath = isCanvasEnvironment ? collection(db, 'artifacts', appId, 'public', 'data', 'surveyResponses') : collection(db, 'surveyResponses');
        const worldcupPollsPath = isCanvasEnvironment ? collection(db, 'artifacts', appId, 'public', 'data', 'worldcupPolls') : collection(db, 'worldcupPolls');
        const worldcupResponsesPath = isCanvasEnvironment ? collection(db, 'artifacts', appId, 'public', 'data', 'worldcupResponses') : collection(db, 'worldcupResponses');
        const worldcupLiveVotesPath = isCanvasEnvironment ? collection(db, 'artifacts', appId, 'public', 'data', 'worldcupLiveVotes') : collection(db, 'worldcupLiveVotes');

        const unsubSurveys = onSnapshot(surveyPath, (snapshot) => {

          data.sort((a, b) => b.timestamp - a.timestamp);

        });
        const unsubSurveyBoards = onSnapshot(surveyBoardsPath, (snapshot) => {
          const data = [];
          snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
          setSurveyBoards(data);
        });
        const unsubSurveyResponses = onSnapshot(surveyResponsesPath, (snapshot) => {
          const data = [];
          snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
          setSurveyResponses(data);
        });
        const unsubWorldcupPolls = onSnapshot(worldcupPollsPath, (snapshot) => {
          const data = [];
          snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
          setWorldcupPolls(data);
        });
        const unsubWorldcupResponses = onSnapshot(worldcupResponsesPath, (snapshot) => {
          const data = [];
          snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
          setWorldcupResponses(data);
        });
        const unsubWorldcupLiveVotes = onSnapshot(worldcupLiveVotesPath, (snapshot) => {
          const data = [];
          snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
          setWorldcupLiveVotes(data);
        });
        const unsubPairPhotoRequests = onSnapshot(pairPhotoRequestsPath, (snapshot) => {
          const data = [];
          snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
          setPairPhotoRequests(data);
        });
        const unsubStudents = onSnapshot(studentsPath, (snapshot) => {
          const data = [];
          snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
          setStudents(data);

        const detail = document.createElement('pre');

        const linkBox = document.createElement('div');

          a.style.cssText = `display:block;background:${color};color:white;text-decoration:none;text-align:center;font-weight:800;padding:12px 14px;border-radius:14px;`;
          linkBox.appendChild(a);
        });
        box.append(title, guide, linkBox, detail);
